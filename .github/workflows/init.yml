name: Init Checkpoints (einmalig)

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python init_checkpoint.py
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranking_*.json
          git diff --cached --quiet || git commit -m "chore: set checkpoints [skip ci]"
          git push
